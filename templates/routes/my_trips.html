{% extends "layout.html" %}
{% block body %}
    <h1 class="mb-4">رحلاتي المحجوزة</h1>
    <div class="list-group shadow">
        {% for route in routes %}
            <a href="{% url 'route' route.id %}" class="list-group-item list-group-item-action p-3">
                <div class="d-flex w-100 justify-content-between">
                    <h5 class="mb-1 text-success">{{ route.origin.name }} ⬅ {{ route.destination.name }}</h5>
                    <span class="badge bg-primary rounded-pill">محجوز</span>
                </div>
                <small class="text-muted">المدة: {{ route.duration }} دقيقة</small>
            </a>
        {% empty %}
            <div class="alert alert-light text-center">لم تقم بحجز أي رحلة بعد.</div>
        {% endfor %}
    </div>
{% endblock %}
